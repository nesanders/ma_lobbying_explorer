<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topics — MA Lobbying Explorer</title>
  <meta name="description" content="Browse bill topics in the Massachusetts lobbying data, with top employers, lobbyists, and bills per topic.">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232563eb'/><text x='50%25' y='56%25' text-anchor='middle' dominant-baseline='middle' font-family='system-ui,sans-serif' font-size='13' font-weight='700' fill='white'>MA</text></svg>">
</head>
<body>
<header>
  <a class="site-title" href="index.html">MA Lobbying Explorer</a>
  <nav>
    <a href="bills.html">Bills</a>
    <a href="employers.html">Employers</a>
    <a href="lobbyists.html">Lobbyists</a>
    <a href="topics.html" class="active">Topics</a>
  </nav>
</header>

<div class="attribution-bar">
  Topics are AI-generated by the <a href="https://github.com/nesanders/MAenvironmentaldata" target="_blank" rel="noopener">AMEND project ↗</a> and currently cover ~75% of bills.
</div>

<main id="main-content">
  <div class="loading">Loading…</div>
</main>

<footer>
  <div>
    Data:
    <a href="https://www.sec.state.ma.us/LobbyistPublicSearch/" target="_blank" rel="noopener">MA Secretary of State</a>
    <span class="sep">·</span>
    <a href="https://malegislature.gov" target="_blank" rel="noopener">MA General Court</a>
  </div>
  <div style="margin-top:0.4rem">
    <a href="https://github.com/nesanders/ma_lobbying_explorer" target="_blank" rel="noopener">Source code</a>
  </div>
</footer>

<script src="assets/app.js"></script>
<script src="assets/charts.js"></script>
<script>
(function() {
  const main = document.getElementById('main-content');

  routePage(listView, 'tag', detailView);

  function listView() {
    document.title = 'Topics — MA Lobbying Explorer';
    showLoading(main);

    DATA.tags.then(tags => {
      renderListView(tags);
    }).catch(err => {
      showError(main, 'Could not load topic data. ' + err.message);
    });
  }

  function renderListView(tags) {
    const params = new URLSearchParams(location.search);
    let filterText = params.get('q') || '';

    const rows = Object.entries(tags).map(([name, info]) => ({
      name,
      n_bills: info.n_bills || 0,
      n_employers: (info.top_employers || []).length,
      n_lobbyists: (info.top_lobbyists || []).length,
    }));

    main.innerHTML = `
      <h1>Bill Topics</h1>
      <p style="color:var(--muted);font-size:0.9rem;margin-bottom:1rem">
        AI-generated topic tags covering ~75% of bills. Click a topic to see top employers, lobbyists, and bills.
      </p>
      <div class="filter-bar">
        <div class="filter-group wide">
          <label for="f-text">Search</label>
          <input type="text" id="f-text" placeholder="Topic name…" value="${escHtml(filterText)}">
        </div>
      </div>
      <div id="table-container"></div>
    `;

    const columns = [
      { key: 'name', label: 'Topic', render: row => `<a href="topics.html?tag=${encodeURIComponent(row.name)}">${escHtml(row.name)}</a>` },
      { key: 'n_bills', label: 'Bills lobbied', className: 'num' },
    ];

    function applyFilters() {
      let r = rows;
      if (filterText) r = fuzzyFilter(r, filterText, ['name']);
      return r;
    }

    function syncParams() {
      const p = new URLSearchParams();
      if (filterText) p.set('q', filterText);
      history.replaceState(null, '', p.toString() ? '?' + p.toString() : location.pathname);
    }

    const container = document.getElementById('table-container');
    const table = renderTable(container, columns, applyFilters(), {
      defaultSortCol: 'n_bills',
      defaultSortDir: 'desc',
    });

    function onFilterChange() { syncParams(); table.update(applyFilters()); }

    let textTimer;
    document.getElementById('f-text').addEventListener('input', e => {
      clearTimeout(textTimer);
      textTimer = setTimeout(() => { filterText = e.target.value; onFilterChange(); }, 250);
    });
  }

  function detailView(params) {
    const tagName = params.get('tag');
    document.title = `${tagName} — MA Lobbying Explorer`;
    showLoading(main);

    Promise.all([DATA.tags, DATA.billsList]).then(([tags, bills]) => {
      const info = tags[tagName];
      if (!info) {
        main.innerHTML = `<div class="breadcrumb"><a href="topics.html">← All topics</a></div><div class="error-state"><strong>Topic not found</strong>No record for "${escHtml(tagName)}".</div>`;
        return;
      }
      renderDetailView(tagName, info, bills);
    }).catch(err => {
      main.innerHTML = `
        <div class="breadcrumb"><a href="topics.html">← All topics</a></div>
        <div class="error-state"><strong>Data not yet available</strong>${escHtml(err.message)}</div>
      `;
    });
  }

  function renderDetailView(tagName, info, allBills) {
    const tagBills = allBills.filter(b => (b.tags || []).includes(tagName));
    const gcOptions = [...new Set(tagBills.map(b => b.general_court))].sort((a, b) => a - b);

    const params = new URLSearchParams(location.search);
    let filterGcs = params.getAll('gc').map(Number).filter(Boolean);

    const topEmps = info.top_employers || [];
    const topLobs = info.top_lobbyists || [];

    main.innerHTML = `
      <div class="breadcrumb"><a href="topics.html">← All topics</a></div>
      <h1>${escHtml(tagName)}</h1>

      <div class="stats-bar">
        <div class="stats-bar-item"><div class="sb-value">${info.n_bills || 0}</div><div class="sb-label">Bills lobbied</div></div>
        <div class="stats-bar-item"><div class="sb-value">${topEmps.length}</div><div class="sb-label">Top employers</div></div>
        <div class="stats-bar-item"><div class="sb-value">${topLobs.length}</div><div class="sb-label">Top lobbyists</div></div>
      </div>

      ${topEmps.length ? `
        <h2>Top employers</h2>
        <div id="employers-table"></div>
      ` : ''}

      ${topLobs.length ? `
        <h2>Top lobbying firms</h2>
        <div id="lobbyists-table"></div>
      ` : ''}

      <h2>Bills</h2>
      <div class="filter-bar" style="margin-bottom:0.75rem">
        <div class="filter-group">
          <label for="f-gc">General Court</label>
          <select id="f-gc" multiple size="3" style="height:auto">
            ${gcOptions.map(gc => `<option value="${gc}" ${filterGcs.includes(gc) ? 'selected' : ''}>GC${gc}</option>`).join('')}
          </select>
        </div>
      </div>
      <div id="bills-table"></div>
    `;

    if (topEmps.length) {
      renderTable(document.getElementById('employers-table'), [
        { key: 'name', label: 'Employer', render: row => `<a href="employers.html?name=${encodeURIComponent(row.slug)}">${escHtml(row.name)}</a>` },
        { key: 'count', label: 'Bills with this topic', className: 'num' },
      ], topEmps.map(([name, slug, count]) => ({ name, slug, count })),
      { defaultSortCol: 'count', defaultSortDir: 'desc' });
    }

    if (topLobs.length) {
      renderTable(document.getElementById('lobbyists-table'), [
        { key: 'name', label: 'Firm', render: row => `<a href="lobbyists.html?name=${encodeURIComponent(row.slug)}">${escHtml(row.name)}</a>` },
        { key: 'count', label: 'Bills with this topic', className: 'num' },
      ], topLobs.map(([name, slug, count]) => ({ name, slug, count })),
      { defaultSortCol: 'count', defaultSortDir: 'desc' });
    }

    function applyBillFilters() {
      let rows = tagBills;
      if (filterGcs.length) rows = rows.filter(b => filterGcs.includes(b.general_court));
      return rows;
    }

    function syncParams() {
      const p = new URLSearchParams();
      p.set('tag', tagName);
      filterGcs.forEach(gc => p.append('gc', gc));
      history.replaceState(null, '', '?' + p.toString());
    }

    const billColumns = [
      { key: 'bill_id', label: 'Bill ID', render: row => `<a href="bills.html?id=${encodeURIComponent(row.bill_id)}&gc=${encodeURIComponent(row.general_court)}">${escHtml(row.bill_id)}</a>` },
      { key: 'bill_title', label: 'Title', className: 'truncate', render: row => escHtml(row.bill_title || '') },
      { key: 'general_court', label: 'GC', render: row => `<span class="chip chip-gc">GC${row.general_court}</span>`, className: 'hide-sm' },
      {
        key: 'sup_opp',
        label: 'Sup/Opp',
        sortVal: row => (row.n_supporters || 0) + (row.n_opposers || 0),
        render: row => `<span style="color:#16a34a">${row.n_supporters || 0}</span> / <span style="color:#dc2626">${row.n_opposers || 0}</span>`,
        className: 'num',
      },
    ];

    const billsContainer = document.getElementById('bills-table');
    const billTable = renderTable(billsContainer, billColumns, applyBillFilters(), {
      defaultSortCol: 'sup_opp',
      defaultSortDir: 'desc',
    });

    document.getElementById('f-gc').addEventListener('change', e => {
      filterGcs = [...e.target.selectedOptions].map(o => Number(o.value));
      syncParams();
      billTable.update(applyBillFilters());
    });
  }
})();
</script>
</body>
</html>
