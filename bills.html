<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bills — MA Lobbying Explorer</title>
  <meta name="description" content="Browse all lobbied bills in the Massachusetts Legislature, with filters by session, topic, and position activity.">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232563eb'/><text x='50%25' y='56%25' text-anchor='middle' dominant-baseline='middle' font-family='system-ui,sans-serif' font-size='13' font-weight='700' fill='white'>MA</text></svg>">
</head>
<body>
<header>
  <a class="site-title" href="index.html">MA Lobbying Explorer</a>
  <nav>
    <a href="bills.html" class="active">Bills</a>
    <a href="employers.html">Employers</a>
    <a href="lobbyists.html">Lobbyists</a>
    <a href="topics.html">Topics</a>
  </nav>
</header>

<div class="attribution-bar">
  Data from the <a href="https://www.sec.state.ma.us/LobbyistPublicSearch/" target="_blank" rel="noopener">MA Secretary of State Lobbyist Public Search ↗</a>
  and <a href="https://malegislature.gov" target="_blank" rel="noopener">MA General Court ↗</a>.
</div>

<main id="main-content">
  <div class="loading">Loading…</div>
</main>

<footer>
  <div>
    Data:
    <a href="https://www.sec.state.ma.us/LobbyistPublicSearch/" target="_blank" rel="noopener">MA Secretary of State</a>
    <span class="sep">·</span>
    <a href="https://malegislature.gov" target="_blank" rel="noopener">MA General Court</a>
  </div>
  <div style="margin-top:0.4rem">
    <a href="https://github.com/nesanders/ma_lobbying_explorer" target="_blank" rel="noopener">Source code</a>
  </div>
</footer>

<script src="assets/app.js"></script>
<script src="assets/charts.js"></script>
<script>
(function() {
  const main = document.getElementById('main-content');

  routePage(listView, 'id', detailView);

  function listView() {
    document.title = 'Bills — MA Lobbying Explorer';
    showLoading(main);

    DATA.billsList.then(bills => {
      renderListView(bills);
    }).catch(err => {
      showError(main, 'Could not load bill data. ' + err.message);
    });
  }

  function renderListView(bills) {
    const gcOptions = [...new Set(bills.map(b => b.general_court))].sort((a, b) => a - b);
    const categoryOptions = [...new Set(bills.flatMap(b => b.categories || []))].sort();

    const params = new URLSearchParams(location.search);
    let filterText = params.get('q') || '';
    let filterGcs = params.getAll('gc').map(Number).filter(Boolean);
    let filterCategory = params.get('cat') || '';
    let filterPosition = params.get('pos') || 'any';
    let filterPassed = params.get('passed') || 'all';

    main.innerHTML = `
      <h1>Bills</h1>
      <div class="filter-bar" id="filter-bar">
        <div class="filter-group wide">
          <label for="f-text">Search</label>
          <input type="text" id="f-text" placeholder="Bill title or ID…" value="${escHtml(filterText)}">
        </div>
        <div class="filter-group">
          <label for="f-gc">General Court</label>
          <select id="f-gc" multiple size="3" style="height:auto">
            ${gcOptions.map(gc => `<option value="${gc}" ${filterGcs.includes(gc) ? 'selected' : ''}>GC${gc}</option>`).join('')}
          </select>
        </div>
        <div class="filter-group">
          <label for="f-cat">Topic</label>
          <select id="f-cat">
            <option value="">All topics</option>
            ${categoryOptions.map(c => `<option value="${escHtml(c)}" ${filterCategory === c ? 'selected' : ''}>${escHtml(c)}</option>`).join('')}
          </select>
          <span class="filter-hint">AI-generated topic tags; untagged bills show "—".</span>
        </div>
        <div class="filter-group">
          <label for="f-pos">Position activity</label>
          <select id="f-pos">
            <option value="any" ${filterPosition === 'any' ? 'selected' : ''}>Any</option>
            <option value="supporters" ${filterPosition === 'supporters' ? 'selected' : ''}>Has supporters</option>
            <option value="opposers" ${filterPosition === 'opposers' ? 'selected' : ''}>Has opposers</option>
            <option value="contested" ${filterPosition === 'contested' ? 'selected' : ''}>Contested</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-passed">Passed</label>
          <select id="f-passed">
            <option value="all" ${filterPassed === 'all' ? 'selected' : ''}>All</option>
            <option value="yes" ${filterPassed === 'yes' ? 'selected' : ''}>Passed</option>
            <option value="no" ${filterPassed === 'no' ? 'selected' : ''}>Not passed</option>
            <option value="unknown" ${filterPassed === 'unknown' ? 'selected' : ''}>Unknown</option>
          </select>
        </div>
      </div>
      <div id="table-container"></div>
    `;

    const columns = [
      { key: 'bill_id', label: 'Bill ID', render: row => `<a href="bills.html?id=${encodeURIComponent(row.bill_id)}&gc=${encodeURIComponent(row.general_court)}">${escHtml(row.bill_id)}</a>` },
      { key: 'bill_title', label: 'Title', className: 'truncate', render: row => escHtml(row.bill_title) },
      { key: 'general_court', label: 'GC', render: row => `<span class="chip chip-gc">GC${row.general_court}</span>`, className: 'hide-sm' },
      { key: 'categories', label: 'Topic', className: 'hide-sm', render: row => (row.categories && row.categories.length) ? row.categories.map(c => `<span class="chip chip-category">${escHtml(c)}</span>`).join(' ') : '—' },
      {
        key: 'clients',
        label: 'Clients',
        sortVal: row => (row.n_supporters || 0) + (row.n_opposers || 0) + (row.n_neutrals || 0) + (row.n_no_position || 0),
        render: row => String((row.n_supporters || 0) + (row.n_opposers || 0) + (row.n_neutrals || 0) + (row.n_no_position || 0)),
        className: 'num',
      },
      {
        key: 'sup_opp',
        label: 'Sup/Opp',
        sortVal: row => (row.n_supporters || 0) + (row.n_opposers || 0),
        render: row => `<span style="color:#16a34a">${row.n_supporters || 0}</span> / <span style="color:#dc2626">${row.n_opposers || 0}</span>`,
        className: 'num',
      },
      { key: 'passed', label: 'Passed', render: row => passedBadge(row.passed), className: 'hide-sm' },
    ];

    function applyFilters() {
      let rows = bills;
      if (filterText) rows = fuzzyFilter(rows, filterText, ['bill_title', 'bill_id']);
      if (filterGcs.length) rows = rows.filter(b => filterGcs.includes(b.general_court));
      if (filterCategory !== '') rows = rows.filter(b => (b.categories || []).includes(filterCategory));
      if (filterPosition === 'supporters') rows = rows.filter(b => (b.n_supporters || 0) > 0);
      else if (filterPosition === 'opposers') rows = rows.filter(b => (b.n_opposers || 0) > 0);
      else if (filterPosition === 'contested') rows = rows.filter(b => (b.n_supporters || 0) > 0 && (b.n_opposers || 0) > 0);
      if (filterPassed === 'yes') rows = rows.filter(b => b.passed === true || b.passed === 1);
      else if (filterPassed === 'no') rows = rows.filter(b => b.passed === false || b.passed === 0);
      else if (filterPassed === 'unknown') rows = rows.filter(b => b.passed == null);
      return rows;
    }

    function syncParams() {
      const p = new URLSearchParams();
      if (filterText) p.set('q', filterText);
      filterGcs.forEach(gc => p.append('gc', gc));
      if (filterCategory) p.set('cat', filterCategory);
      if (filterPosition !== 'any') p.set('pos', filterPosition);
      if (filterPassed !== 'all') p.set('passed', filterPassed);
      history.replaceState(null, '', p.toString() ? '?' + p.toString() : location.pathname);
    }

    const container = document.getElementById('table-container');
    const defaultRows = [...bills].sort((a, b) => ((b.n_supporters || 0) + (b.n_opposers || 0)) - ((a.n_supporters || 0) + (a.n_opposers || 0)));
    const table = renderTable(container, columns, applyFilters(), {
      defaultSortCol: 'sup_opp',
      defaultSortDir: 'desc',
    });

    function onFilterChange() {
      syncParams();
      table.update(applyFilters());
    }

    let textTimer;
    document.getElementById('f-text').addEventListener('input', e => {
      clearTimeout(textTimer);
      textTimer = setTimeout(() => { filterText = e.target.value; onFilterChange(); }, 250);
    });

    document.getElementById('f-gc').addEventListener('change', e => {
      filterGcs = [...e.target.selectedOptions].map(o => Number(o.value));
      onFilterChange();
    });

    document.getElementById('f-cat').addEventListener('change', e => {
      filterCategory = e.target.value; onFilterChange();
    });

    document.getElementById('f-pos').addEventListener('change', e => {
      filterPosition = e.target.value; onFilterChange();
    });

    document.getElementById('f-passed').addEventListener('change', e => {
      filterPassed = e.target.value; onFilterChange();
    });
  }

  function detailView(params) {
    const billId = params.get('id');
    const gc = params.get('gc');
    document.title = `${billId} — MA Lobbying Explorer`;
    showLoading(main);

    Promise.all([DATA.billsList, getBillsDetail(), getEdgesByBill()]).then(([bills, detail, edgesByBill]) => {
      const key = `${billId}_${gc}`;
      const billDetail = detail ? detail[key] : null;
      const billBasic = bills.find(b => b.bill_id === billId && String(b.general_court) === String(gc));
      const bill = billDetail || billBasic;

      if (!bill) {
        main.innerHTML = `<div class="breadcrumb"><a href="bills.html">← All bills</a></div><div class="error-state"><strong>Bill not found</strong>No record for ${escHtml(billId)} in GC${escHtml(gc)}.</div>`;
        return;
      }

      const edges = edgesByBill ? (edgesByBill[key] || []) : [];
      renderDetailView(bill, edges, bills);
    }).catch(err => {
      main.innerHTML = `
        <div class="breadcrumb"><a href="bills.html">← All bills</a></div>
        <div class="error-state"><strong>Data not yet available</strong>The detail data files have not been generated yet. ${escHtml(err.message)}</div>
      `;
    });
  }

  function renderDetailView(bill, edges, allBills) {
    const gc = bill.general_court;
    const billId = bill.bill_id;
    const malegUrl = `https://malegislature.gov/Bills/${encodeURIComponent(gc)}/${encodeURIComponent(billId)}`;
    const sosUrl = 'https://www.sec.state.ma.us/LobbyistPublicSearch/';

    const categories = bill.categories || [];
    const tags = bill.tags || [];

    const noTaxonomy = !categories.length && !tags.length;
    const chipsHtml = [
      `<span class="chip chip-gc">GC${gc}</span>`,
      passedBadge(bill.passed),
      ...categories.map(c => categoryChip(c)),
      ...tags.map(t => tagChip(t)),
      noTaxonomy ? `<span class="no-taxonomy-note">Topic tags not yet available for this bill.</span>` : '',
    ].filter(Boolean).join('');

    const summary = bill.summary;
    const summaryHtml = summary
      ? `<blockquote>${escHtml(summary)}</blockquote>`
      : `<blockquote class="no-summary"><em>No summary available</em></blockquote>`;

    const sortedEdges = [...edges].sort((a, b) => (b.year || 0) - (a.year || 0));
    const edgeRows = sortedEdges.map(e => {
      const empLink = `<a href="employers.html?name=${encodeURIComponent(slugify(e.client_name || ''))}">${escHtml(e.client_name)}</a>`;
      const firmLink = `<a href="lobbyists.html?name=${encodeURIComponent(slugify(e.entity_name || ''))}">${escHtml(e.entity_name)}</a>`;
      return `<tr>
        <td>${empLink}</td>
        <td>${firmLink}</td>
        <td class="num">${escHtml(String(e.year || ''))}</td>
        <td>${positionChip(e.position)}</td>
      </tr>`;
    }).join('');

    const nSup = bill.n_supporters || 0;
    const nOpp = bill.n_opposers || 0;
    const nNeu = bill.n_neutrals || 0;
    const nNone = bill.n_no_position || 0;

    const seeAlso = computeSeeAlso(bill, allBills, 3);
    const seeAlsoHtml = seeAlso.length ? seeAlso.map(b => `
      <div class="see-also-item">
        <span class="sa-id">${escHtml(b.bill_id)} GC${b.general_court}</span>
        <span class="sa-title"><a href="bills.html?id=${encodeURIComponent(b.bill_id)}&gc=${encodeURIComponent(b.general_court)}">${escHtml(b.bill_title)}</a></span>
      </div>`).join('') : noTaxonomy
        ? '<p class="no-data">Similar bills can\'t be shown because this bill hasn\'t been tagged yet.</p>'
        : '<p class="no-data">No similar bills found.</p>';

    main.innerHTML = `
      <div class="breadcrumb"><a href="bills.html">← All bills</a></div>
      <h1>${escHtml(bill.bill_title || billId)}</h1>

      <div class="external-links">
        <a class="ext-link-btn" href="${escHtml(malegUrl)}" target="_blank" rel="noopener">
          📋 Full text on malegislature.gov ↗
        </a>
        <a class="ext-link-btn" href="${escHtml(sosUrl)}" target="_blank" rel="noopener">
          🔍 Search SoS lobbying disclosures ↗
        </a>
      </div>

      <div class="chips-row">${chipsHtml}</div>

      <h2>Summary</h2>
      ${summaryHtml}
      <p style="font-size:0.78rem;color:var(--muted);margin-top:0.4rem">
        Summary, categories, and tags are AI-generated by the
        <a href="https://github.com/nesanders/MAenvironmentaldata" target="_blank" rel="noopener">AMEND project ↗</a>.
      </p>

      <h2>Who lobbied this bill</h2>
      ${edges.length ? `
        <div class="chart-wrap" style="height:120px">
          <canvas id="pos-bar"></canvas>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Employer</th>
              <th>Lobbying firm</th>
              <th>Year</th>
              <th>Position</th>
            </tr></thead>
            <tbody>${edgeRows}</tbody>
          </table>
        </div>
      ` : '<p class="no-data">No lobbying records found for this bill.</p>'}

      <h2>See also</h2>
      <p style="font-size:0.78rem;color:var(--muted);margin-bottom:0.5rem">
        Bills scored by shared AI-assigned categories and tags.
      </p>
      <div class="see-also-list">${seeAlsoHtml}</div>
    `;

    if (edges.length) {
      renderPositionBar('pos-bar', { n_supporters: nSup, n_opposers: nOpp, n_neutrals: nNeu, n_no_position: nNone });
    }
  }

  function computeSeeAlso(bill, allBills, n) {
    const myTags = new Set(bill.tags || []);
    const myCats = new Set(bill.categories || []);
    const myKey = `${bill.bill_id}_${bill.general_court}`;

    if (!myTags.size && !myCats.size) return [];

    return allBills
      .filter(b => `${b.bill_id}_${b.general_court}` !== myKey)
      .map(b => {
        const bTags = new Set(b.tags || []);
        const bCats = new Set(b.categories || []);
        const sharedTags = [...myTags].filter(t => bTags.has(t)).length;
        const sharedCats = [...myCats].filter(c => bCats.has(c)).length;
        return { b, score: sharedTags * 2 + sharedCats };
      })
      .filter(x => x.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, n)
      .map(x => x.b);
  }
})();
</script>
</body>
</html>
