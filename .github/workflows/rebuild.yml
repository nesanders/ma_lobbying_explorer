name: Rebuild and deploy

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:       # manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download source data from GCS
        run: |
          curl -fL https://storage.googleapis.com/openamend-data/amend.db.gz \
            | gunzip > amend.db
          curl -fL https://storage.googleapis.com/openamend-data/MA_bill_embeddings.parquet \
            -o MA_bill_embeddings.parquet

      - name: Generate JSON data files
        run: |
          python build/export_json.py \
            --db-path amend.db \
            --parquet-path MA_bill_embeddings.parquet \
            --output-dir data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
